version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: production
      PORT: 3333
      MONGODB_URL: mongodb://mongo:27017/reviewlico
      REDIS_URL: redis://redis:6379
      # Set the remaining vars via a .env file or secrets manager:
      # SERVER_URL, FRONTEND_URL, JWT_ACCESS_SECRET, SMTP_*
    env_file:
      - ./apps/api/.env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
